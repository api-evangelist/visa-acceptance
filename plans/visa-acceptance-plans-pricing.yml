specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Visa Acceptance
providerId: visa-acceptance
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Payments
  - Card Acceptance
  - Cybersource
  - Enterprise
  - B2B
description: Visa Acceptance Solutions (formerly Cybersource) does not publish self-service pricing
  for its payment APIs. Pricing is contractual and depends on processor agreement, region, MCC,
  volume, and value-added services (decision manager, tokenization, etc.); the developer portal
  exposes sandbox sign-up but routes commercial inquiries to Visa Acceptance sales.
sources:
  - https://developer.cybersource.com/
notes: Reviewed on 2026-05-05; no public price list or per-transaction rate is published. A single
  Contact Sales plan preserves the artifact shape.
plans:
  - id: visa-acceptance-contact-sales
    name: Contact Sales
    type: enterprise
    description: Custom merchant agreement covering Visa Acceptance / Cybersource payment APIs,
      tokenization, fraud, and reporting.
    entries:
      - label: Per-transaction processing
        name: per_transaction
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Value-added services
        name: value_added_services
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Payment APIs
      - name: Tokenization
      - name: Decision Manager (Fraud)
      - name: Reporting / Business Center
      - name: Sandbox access (free)
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
