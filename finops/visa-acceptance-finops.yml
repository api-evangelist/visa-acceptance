specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Visa Acceptance
providerId: visa-acceptance
publisherName: CyberSource Corporation (a Visa company)
serviceCategory: Payments
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Payments
  - Card Acceptance
  - Cybersource
description: FOCUS-aligned FinOps shape for Visa Acceptance / Cybersource. Pricing is contractual
  per-merchant; meters reflect the canonical line items on a card-acceptance invoice rather than
  publicly priced units.
sources:
  - https://developer.cybersource.com/
notes: No public unit prices were available; per-transaction take rate, interchange, and
  value-added-service fees are negotiated under the merchant processing agreement.
billingModel:
  pricingCategory: Take Rate + Subscription
  billingFrequency: Monthly
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Refund
    - Adjustment
focusColumns:
  ServiceName: Visa Acceptance / Cybersource
  ServiceCategory: Payments
  ProviderName: Visa Acceptance Solutions
  PublisherName: CyberSource Corporation
  InvoiceIssuerName: CyberSource Corporation
  BillingCurrency: USD
meters:
  - name: card_transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - card_brand
      - region
      - mcc
  - name: transaction_volume
    unit: USD
    aggregation: sum
    dimensions:
      - card_brand
      - region
  - name: tokenization_requests
    unit: request
    aggregation: sum
  - name: fraud_screen_requests
    unit: request
    aggregation: sum
    dimensions:
      - decision_outcome
  - name: refunds
    unit: transaction
    aggregation: sum
principles:
  - name: Visibility
    description: Use the Business Center reports and Reporting / On-Demand Reporting REST APIs to
      pull settlement, fee, and transaction-level detail; reconcile against the monthly merchant
      statement.
  - name: Allocation
    description: Tag transactions with merchant_defined_data fields (MID, sub-merchant, brand) so
      cost can be allocated across business units sharing a Visa Acceptance contract.
  - name: Optimization
    description: Levers include processor / acquirer routing, network tokenization to lift auth
      rates, decision-manager rule tuning to reduce false declines, and renegotiating tier breaks
      against settled volume.
  - name: Accountability
    description: Payments / treasury owns the merchant agreement; engineering owns API integration
      and decision-manager rules; finance reconciles the monthly statement.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
