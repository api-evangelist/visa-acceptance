specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Visa Acceptance
providerId: visa-acceptance
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Payments
  - Cybersource
  - Card Acceptance
description: Visa Acceptance Solutions (Cybersource) does not publish a public rate-limit table for
  its REST APIs. Throughput is governed by the merchant's processor agreement and per-region
  capacity; sustained TPS for production traffic is provisioned through Visa Acceptance support.
sources:
  - https://developer.cybersource.com/
responseCodes:
  throttled: 429
limits:
  - name: Production TPS
    scope: merchant
    metric: requests_per_second
    limit: provisioned per merchant agreement; not publicly published
  - name: Sandbox / test environment
    scope: merchant
    metric: varies
    limit: capped for evaluation; contact support for raise requests
policies:
  - name: Provisioned throughput
    description: Sustained transaction throughput is allocated per merchant in coordination with
      Visa Acceptance's onboarding and support teams; bursts above provisioned TPS may be throttled.
  - name: Backoff
    description: On 429 / 503 responses, clients should implement exponential backoff with jitter
      and retry idempotent operations using the client-reference / merchant-defined identifier to
      avoid duplicate authorizations.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
